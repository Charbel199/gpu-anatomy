    - [warp_scheduler, warp_scheduler, warp_scheduler, warp_scheduler]
    - [dispatch_unit, scoreboard, simt_stack]
    - [register_file, uniform_register_file, warp_shuffle]
    - [fp32_cores, int32_cores, fp64_cores]
    - [tensor_cores, sfu, ld_st, rt_cores]
    - [shared_memory_l1, l1_data, constant_cache, texture_cache]
    - [async_copy, tma, shared_atomic_unit, local_memory]
    - [thread_block_clusters, dsmem, transformer_engine, tensor_cores_5th, dpx]

- id: memory
  title: "Memory Hierarchy"
  layout: pyramid
  rows:
    - [register_file]
    - [warp_shuffle]
    - [shared_memory_l1, l1_data]
    - [constant_cache, texture_cache]
    - [l2_cache]
    - [local_memory]
    - [hbm]
