- id: chip
  title: "GPU Chip"
  layout: stack
  rows:
    - [gigathread]
    - [gpc, gpc, gpc, gpc, gpc, gpc, gpc, gpc]
    # SMs flattened under GPCs for v1 rendering.
    - [sm, sm, sm, sm, sm, sm, sm, sm]
    - [l2_cache, l2_atomic, l2_residency]
    - [memory_controllers]
    - [hbm]
    - [pcie, nvlink, nvswitch, c2c]
    - [copy_engines, page_migration_engine]
    - [nvenc, nvdec, nvjpg, nvof]
    - [raster_engine, rop, display_engine]
    - [mig, confidential_computing]

- id: sm
  title: "SM - Streaming Multiprocessor"
  layout: stack
