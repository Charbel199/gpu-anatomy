# ============================================================================
# 1. Chip-Level Organization (#1-#4)
# ============================================================================

- id: gigathread
  number: 1
  name: "GigaThread Engine"
  category: scheduling
  views: [chip]
  count: { per: "GPU", n: 1 }
  short: "Top-level scheduler. Distributes thread blocks to GPCs/SMs."
  details: |
    Global work distributor. Assigns thread blocks to GPCs/SMs and manages grid launches.
    One per GPU.
  related: [gpc, sm]
  arch_introduced: Fermi

- id: gpc
  number: 2
  name: "GPC"
  category: scheduling
  views: [chip]
  parent: gigathread
  count: { per: "GPU", n: 8 }
  short: "Graphics Processing Cluster - group of TPCs."
  details: |
    Intermediate hierarchy level. Contains a Raster Engine and several TPCs.
  related: [tpc, sm, raster_engine]
  arch_introduced: Fermi

- id: tpc
  number: 3
  name: "TPC"
  category: scheduling
  views: [chip]
  parent: gpc
  count: { per: "GPC", n: 3 }
  short: "Texture Processing Cluster - group of SMs plus shared texture units."
  related: [gpc, sm, texture_cache]
  arch_introduced: Fermi

- id: sm
  number: 4
  name: "Streaming Multiprocessor"
  category: compute
  views: [chip]
  parent: tpc
  count: { per: "GPU", n: 132 }
  short: "The main compute unit. Everything in the sm view lives inside an SM."
  details: |
    Each SM has warp schedulers, a register file, FP32/INT32/FP64 cores,
    Tensor and RT cores, LD/ST units, SFUs, and a unified L1/shared SRAM.
  related: [warp_scheduler, fp32_cores, tensor_cores, shared_memory_l1]
  arch_introduced: Fermi

# ============================================================================
# 2. Inside the SM - Scheduling (#5-#9)
# ============================================================================

- id: warp_scheduler
  number: 5
  name: "Warp Scheduler"
  category: scheduling
  views: [sm]
  parent: sm
  count: { per: "SM", n: 4 }
  short: "Picks one ready warp per cycle and issues its next instruction."
  key_numbers:
    - "~1 cycle issue rate"
  details: |
    Scoreboard tracks register dependencies to determine which warps are ready.
    On Volta+ each SM has four schedulers, each with its own dispatch unit.
  related: [register_file, instruction_cache, scoreboard, dispatch_unit, simt_stack]
  modules: ["04-warp-behavior"]
  arch_introduced: Fermi

- id: dispatch_unit
  number: 6
  name: "Dispatch Unit"
  category: scheduling
  views: [sm]
  parent: warp_scheduler
  count: { per: "Warp Scheduler", n: 2 }
  short: "Sends the decoded instruction to the correct execution unit."
  related: [warp_scheduler, scoreboard]
  arch_introduced: Fermi

- id: scoreboard
  number: 7
  name: "Scoreboard"
  category: scheduling
  views: [sm]
  parent: warp_scheduler
  short: "Tracks register dependencies to know when a warp is ready to issue."
  related: [warp_scheduler, dispatch_unit, register_file]
  arch_introduced: Fermi

- id: instruction_cache
  number: 8
  name: "Instruction Cache"
  category: scheduling
  views: [sm]
  parent: sm
  count: { per: "SM", n: 1 }
  short: "Caches decoded instructions to avoid refetching from L2/DRAM."
  key_numbers:
    - "small (KB range)"
  related: [warp_scheduler]
  modules: ["22-instruction-cache"]
  arch_introduced: Fermi

- id: simt_stack
  number: 9
  name: "SIMT Stack / Convergence Barrier"
  category: scheduling
  views: [sm]
  parent: warp_scheduler
  short: "Manages thread divergence. Tracks which threads are active per warp."
  related: [warp_scheduler]
  modules: ["04-warp-behavior"]
  arch_introduced: Fermi

# ============================================================================
# 3. Inside the SM - Register File (#10-#12)
# ============================================================================

- id: register_file
  number: 10
  name: "Register File"
  category: memory
  views: [sm, memory]
  parent: sm
  count: { per: "SM", n: 1 }
  short: "Per-thread private storage. The fastest memory on the chip."
  key_numbers:
    - "65,536 × 32-bit registers per SM"
    - "~1 cycle latency"
    - "~8 TB/s"
  details: |
    Registers are partitioned among all resident threads. Register pressure
    is often the primary limiter of occupancy.
  related: [warp_scheduler, warp_shuffle, local_memory, uniform_register_file]
  modules: ["03-registers"]
  latency: fast
  arch_introduced: Fermi

- id: warp_shuffle
  number: 11
  name: "Warp Shuffle"
  category: memory
  views: [sm, memory]
  parent: register_file
  short: "Cross-lane data path - threads read each other's registers directly."
  key_numbers:
    - "32 lanes"
    - "~1 cycle"
    - "~4 TB/s"
  details: |
    __shfl_sync, __shfl_up_sync, __shfl_down_sync, __shfl_xor_sync.
    Register-to-register across lanes - no memory touched.
  related: [register_file]
  modules: ["05-warp-shuffle"]
  latency: fast
  arch_introduced: Kepler

- id: uniform_register_file
  number: 12
  name: "Uniform Register File"
  category: memory
  views: [sm]
  parent: register_file
  short: "Shared registers for values identical across a warp. Saves register pressure."
  related: [register_file]
  latency: fast
  arch_introduced: Hopper

